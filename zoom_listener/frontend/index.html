<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
  <script src="https://unpkg.com/streamlit-component-lib/dist/index.js"></script>
</head>
<body>
  <div id="plot"></div>
  <script>
    const data = [{ x:[1,2,3,4,5], y:[10,20,30,40,50], type:'scatter' }];
    Plotly.newPlot('plot', data);

    const plotDiv = document.getElementById('plot');

    plotDiv.on('plotly_relayout', function(eventData){
      const ranges = {
        xrange: [eventData['xaxis.range[0]'], eventData['xaxis.range[1]']],
        yrange: [eventData['yaxis.range[0]'], eventData['yaxis.range[1]']]
      };
      Streamlit.setComponentValue(ranges);
    });
  </script>
</body>
</html>
